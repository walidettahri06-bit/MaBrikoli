<div class="max-w-2xl mx-auto space-y-6 text-left" id="artisan-edit">
  <div class="space-y-1">
    <h1 class="text-2xl font-black text-slate-900 tracking-tight">Edit Artisan Card</h1>
    <p class="text-xs text-slate-400">Keep your hourly price and professional details synchronized.</p>
  </div>

  <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 sm:p-8 relative overflow-hidden">
    <div class="absolute top-0 left-0 right-0 h-1.5 bg-blue-600"></div>

    @if (saved) {
      <div class="bg-emerald-50 text-emerald-800 p-4 rounded-xl border border-emerald-100 text-xs flex items-center space-x-2 mb-4">
        <svg lucideCheckCircle class="h-4.5 w-4.5 text-emerald-600"></svg>
        <span>Profile settings saved successfully!</span>
      </div>
    }

    @if (error) {
      <div class="bg-red-50 text-red-700 p-3 rounded-xl border border-red-100 text-xs mb-4">
        {{ error }}
      </div>
    }

    <form (submit)="onSubmit()" class="space-y-4 text-xs">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-700 block">First Name</label>
          <input
            type="text"
            required
            readonly
            name="firstName"
            [(ngModel)]="firstName"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-400 focus:outline-none bg-slate-100 cursor-not-allowed"
          />
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-700 block">Last Name</label>
          <input
            type="text"
            required
            readonly
            name="lastName"
            [(ngModel)]="lastName"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-400 focus:outline-none bg-slate-100 cursor-not-allowed"
          />
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-700 block">Hourly Rate (MAD) *</label>
          <input
            type="number"
            required
            name="hourlyPrice"
            [(ngModel)]="hourlyPrice"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 focus:outline-none focus:ring-1 focus:ring-blue-600 bg-slate-50/50"
          />
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-700 block">Years of Experience *</label>
          <input
            type="number"
            required
            name="yearsOfExperience"
            [(ngModel)]="yearsOfExperience"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 focus:outline-none focus:ring-1 focus:ring-blue-600 bg-slate-50/50"
          />
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-700 block">City *</label>
          <select
            name="city"
            [(ngModel)]="city"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 focus:outline-none focus:ring-1 focus:ring-blue-600 bg-slate-50/50"
          >
            <option value="Casablanca">Casablanca</option>
            <option value="Rabat">Rabat</option>
            <option value="Marrakech">Marrakech</option>
            <option value="Tangier">Tangier</option>
          </select>
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-xs font-bold text-slate-700 block">Service Address</label>
        <input
          type="text"
          name="address"
          [(ngModel)]="address"
          placeholder="e.g. 14 Rue Ghandi"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 focus:outline-none focus:ring-1 focus:ring-blue-600 bg-slate-50/50"
        />
      </div>

      <div class="space-y-1.5">
        <label class="text-xs font-bold text-slate-700 block">Professional biography *</label>
        <textarea
          rows="4"
          required
          name="bio"
          [(ngModel)]="bio"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 focus:outline-none focus:ring-1 focus:ring-blue-600 bg-slate-50/50 resize-none"
        ></textarea>
      </div>

      <div class="flex items-center space-x-2 pt-2">
        <input
          type="checkbox"
          name="available"
          id="available"
          [(ngModel)]="available"
          class="rounded text-blue-600 focus:ring-blue-500"
        />
        <label for="available" class="text-xs font-bold text-slate-700">Currently Available for Bookings</label>
      </div>

      <div class="flex space-x-3 pt-4">
        <button
          type="button"
          (click)="cancel()"
          class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-extrabold rounded-xl transition text-xs cursor-pointer"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white font-extrabold rounded-xl transition text-xs cursor-pointer"
        >
          Save Profile Settings
        </button>
      </div>
    </form>
  </div>
</div>
