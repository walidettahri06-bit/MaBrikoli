<div class="bg-slate-50 min-h-screen flex items-center justify-center py-20 px-4" id="forgot-pass">
  <div class="max-w-md w-full bg-white rounded-3xl border border-slate-100 shadow-xl p-8 space-y-6 text-left relative overflow-hidden">
    <div class="absolute top-0 left-0 right-0 h-1.5 bg-blue-600"></div>

    <button
      type="button"
      (click)="navigateToLogin()"
      class="inline-flex items-center space-x-1 text-xs text-slate-400 hover:text-slate-800 transition cursor-pointer bg-transparent border-none"
    >
      <svg lucideArrowLeft class="h-4 w-4"></svg>
      <span>Back to Login</span>
    </button>

    @if (done) {
      <div class="space-y-4 py-4 text-center">
        <div class="h-12 w-12 rounded-full bg-emerald-50 text-emerald-600 border border-emerald-100 flex items-center justify-center mx-auto">
          <svg lucideCheckCircle class="h-6 w-6"></svg>
        </div>
        <h2 class="text-xl font-extrabold text-slate-900">Reset Link Dispatched</h2>
        <p class="text-xs text-slate-500 leading-relaxed">
          If the email <strong>{{ email }}</strong> is registered in our screening files, you will receive password reset instructions within 2 minutes.
        </p>
      </div>
    } @else {
      <div class="space-y-1">
        <h2 class="text-2xl font-black text-slate-900 tracking-tight">Reset Password</h2>
        <p class="text-xs text-slate-400">Provide your secure account email to retrieve a secure access link</p>
      </div>

      <form (submit)="onSubmit()" class="space-y-4">
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-700 block">Registered Email Address</label>
          <div class="relative">
            <svg lucideMail class="absolute left-3 top-3.5 h-4 w-4 text-slate-400"></svg>
            <input
              type="email"
              required
              name="email"
              [(ngModel)]="email"
              placeholder="walidettahri06@gmail.com"
              class="w-full pl-9 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-1 focus:ring-blue-600 text-xs text-slate-800 bg-slate-50/50"
            />
          </div>
        </div>

        <button
          type="submit"
          class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-extrabold rounded-2xl shadow-lg shadow-blue-100 transition cursor-pointer text-xs"
        >
          Send Reset Instructions
        </button>
      </form>
    }
  </div>
</div>
