<div class="bg-slate-50 min-h-screen flex items-center justify-center py-20 px-4" id="register-client">
  <div class="max-w-md w-full bg-white rounded-[32px] border border-slate-100 shadow-xl p-8 space-y-6 text-left relative overflow-hidden">
    <div class="absolute top-0 left-0 right-0 h-1.5 bg-blue-600"></div>

    <button
      type="button"
      (click)="navigateToLogin()"
      class="inline-flex items-center space-x-1 text-xs text-slate-400 hover:text-slate-800 transition cursor-pointer bg-transparent border-none"
    >
      <svg lucideArrowLeft class="h-4 w-4"></svg>
      <span>Back to Login</span>
    </button>

    <div class="space-y-1">
      <h2 class="text-2xl font-black text-slate-900 tracking-tight">Create Client Account</h2>
      <p class="text-xs text-slate-400">Join Morocco's safest platform for verified home care</p>
    </div>

    @if (error) {
      <div class="bg-red-50 text-red-700 p-3.5 rounded-xl border border-red-100 text-xs flex items-center space-x-2">
        <svg lucideShieldAlert class="h-4.5 w-4.5 text-red-500 shrink-0"></svg>
        <span>{{ error }}</span>
      </div>
    }

    <form (submit)="onSubmit()" class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-700 block">First Name *</label>
          <div class="relative">
            <svg lucideUser class="absolute left-3 top-3.5 h-4 w-4 text-slate-400"></svg>
            <input
              type="text"
              required
              name="firstName"
              [(ngModel)]="firstName"
              placeholder="e.g. Walid"
              class="w-full pl-9 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-1 focus:ring-blue-600 text-xs text-slate-800 bg-slate-50/50"
            />
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-700 block">Last Name *</label>
          <div class="relative">
            <svg lucideUser class="absolute left-3 top-3.5 h-4 w-4 text-slate-400"></svg>
            <input
              type="text"
              required
              name="lastName"
              [(ngModel)]="lastName"
              placeholder="e.g. Ettahri"
              class="w-full pl-9 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-1 focus:ring-blue-600 text-xs text-slate-800 bg-slate-50/50"
            />
          </div>
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-xs font-bold text-slate-700 block">Email Address *</label>
        <div class="relative">
          <svg lucideMail class="absolute left-3 top-3.5 h-4 w-4 text-slate-400"></svg>
          <input
            type="email"
            required
            name="email"
            [(ngModel)]="email"
            placeholder="e.g. walid@gmail.com"
            class="w-full pl-9 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-1 focus:ring-blue-600 text-xs text-slate-800 bg-slate-50/50"
          />
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-xs font-bold text-slate-700 block">Phone Number *</label>
        <div class="relative">
          <svg lucidePhone class="absolute left-3 top-3.5 h-4 w-4 text-slate-400"></svg>
          <input
            type="tel"
            required
            name="phoneNumber"
            [(ngModel)]="phoneNumber"
            placeholder="e.g. +212677123456"
            class="w-full pl-9 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-1 focus:ring-blue-600 text-xs text-slate-800 bg-slate-50/50"
          />
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-xs font-bold text-slate-700 block">Password *</label>
        <div class="relative">
          <svg lucideLock class="absolute left-3 top-3.5 h-4 w-4 text-slate-400"></svg>
          <input
            type="password"
            required
            name="password"
            [(ngModel)]="password"
            placeholder="••••••••••••"
            class="w-full pl-9 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-1 focus:ring-blue-600 text-xs text-slate-800 bg-slate-50/50"
          />
        </div>
      </div>

      <button
        type="submit"
        class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-extrabold rounded-2xl shadow-lg shadow-blue-100 transition cursor-pointer text-xs"
      >
        Create Free Account
      </button>
    </form>
  </div>
</div>
