<div class="max-w-2xl mx-auto space-y-6 text-left" id="client-settings">
  <div class="space-y-1">
    <h1 class="text-2xl font-black text-slate-900 tracking-tight">Client Settings</h1>
    <p class="text-xs text-slate-400">Manage your address and communication channels for plumber schedules.</p>
  </div>

  <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 sm:p-8 relative overflow-hidden">
    <div class="absolute top-0 left-0 right-0 h-1.5 bg-blue-600"></div>

    @if (saved) {
      <div class="bg-emerald-50 text-emerald-800 p-3.5 rounded-xl border border-emerald-100 text-xs font-bold flex items-center space-x-2 mb-4">
        <svg lucideCheckCircle class="h-4.5 w-4.5 text-emerald-600"></svg>
        <span>Settings saved successfully!</span>
      </div>
    }

    <form (submit)="onSubmit()" class="space-y-4 text-xs">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label class="font-bold text-slate-700">Full Name</label>
          <input
            type="text"
            required
            name="name"
            [(ngModel)]="name"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 bg-slate-50/50 focus:outline-none focus:ring-1 focus:ring-blue-600"
          />
        </div>
        <div class="space-y-1.5">
          <label class="font-bold text-slate-700">Email Address</label>
          <input
            type="email"
            required
            name="email"
            [(ngModel)]="email"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 bg-slate-50/50 focus:outline-none focus:ring-1 focus:ring-blue-600"
          />
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label class="font-bold text-slate-700">Phone Mobile</label>
          <input
            type="text"
            required
            name="phone"
            [(ngModel)]="phone"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 bg-slate-50/50 focus:outline-none focus:ring-1 focus:ring-blue-600"
          />
        </div>
        <div class="space-y-1.5">
          <label class="font-bold text-slate-700">Primary Office City</label>
          <select
            name="city"
            [(ngModel)]="city"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 bg-slate-50/50 focus:outline-none focus:ring-1 focus:ring-blue-600"
          >
            <option value="Casablanca">Casablanca</option>
            <option value="Rabat">Rabat</option>
            <option value="Marrakech">Marrakech</option>
            <option value="Tangier">Tangier</option>
          </select>
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="font-bold text-slate-700">Default Service Address</label>
        <input
          type="text"
          required
          name="address"
          [(ngModel)]="address"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 bg-slate-50/50 focus:outline-none focus:ring-1 focus:ring-blue-600"
        />
      </div>

      <button
        type="submit"
        class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-extrabold rounded-xl text-xs shadow-md cursor-pointer"
      >
        Save Client Preferences
      </button>
    </form>
  </div>
</div>
